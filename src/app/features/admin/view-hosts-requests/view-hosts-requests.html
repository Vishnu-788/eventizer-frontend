<div class="requests-container h-100 rounded-4 p-4">
  @for (host of hostRequests(); track host.user.id) {
    <div class="request rounded-4 p-3 my-2">
      <div class="req-head d-flex justify-content-between">
        <div class="d-flex">
          <h4>{{host.user.username}}</h4>
        </div>
        <span class="rounded-4 p-2">{{host.status}}</span>
      </div>
      <div class="req-body">
        <div>
          <p><span>Company: </span>{{host.company_name}}</p>
          <p><span>Company Contact: </span>{{host.company_contact_no}}</p>
          <p><span>Company Email: </span>{{host.company_contact_email}}</p>
        </div>
        <p class="mt-3"><span>Host Email: </span>{{host.user.email}}</p>
      </div>
      <div class="d-flex justify-content-end gap-4">
        <button
          class="btn btn-outline-success"
          (click)="handleClick(host.user.id, 'approved')"
        >
          Approve
        </button>
        <button
          class="btn btn-outline-danger"
          (click)="handleClick(host.user.id, 'rejected')"
        >
          Reject
        </button>
      </div>
    </div>
  }
</div>
