<form class="profile-edit h-100 d-flex flex-column" [formGroup]="profileForm" (ngSubmit)="handleSubmit()">

  <!-- Header -->
  <div class="header px-5 py-4">
    <h2>Edit Profile</h2>

    <div class="actions d-flex gap-2">
      <button type="button" routerLink="/host/profile" class="btn btn-light">
        Cancel
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="profileForm.invalid">
        Save Changes
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="content container-fluid px-5 py-4 flex-grow-1">
    <div class="form-grid">

      <div class="form-group">
        <label>First Name</label>
        <input type="text" formControlName="first_name" class="form-control">
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input type="text" formControlName="last_name" class="form-control">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" class="form-control">
      </div>

      <div class="form-group">
        <label>Company Name</label>
        <input type="text" formControlName="company_name" class="form-control">
      </div>

      <div class="form-group">
        <label>Company Email</label>
        <input type="email" formControlName="company_contact_email" class="form-control">
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="text" formControlName="company_contact_no" class="form-control">
      </div>

    </div>
  </div>

</form>
