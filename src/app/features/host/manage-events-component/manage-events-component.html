<div class="manage-event-container h-100 rounded-4 px-4 py-2">
  <div class="events-list h-100">
    @for (event of events(); track event.id) {
      <app-event-card-component
        [componentNavigationUrl]="'host/event/'"
        [event]="event"
      />
    }
  </div>
  <button routerLink="/host/event/create" class="btn rounded-4" >+ Add Event</button>
</div>
