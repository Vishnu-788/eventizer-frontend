<aside class="d-flex h-100">
  <div class="host-sidebar-container d-flex flex-column rounded-4 flex-fill py-4 px-3">
    <header class="mb-4">
      <h4 class="text-primary-custom text-center">Eventizer</h4>
    </header>

    <div class="items-container flex-grow-1">
      <ul class="nav flex-column gap-2 sidebar-nav">
        <li class="nav-item">
          <a
            class="nav-link sidebar-link d-flex align-items-center justify-content-start gap-2"
            routerLink="/host"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}"
          >
            <app-date-icon class="icon" />
            <span>Manage Events</span>
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link sidebar-link d-flex align-items-center justify-content-start gap-2"
            routerLink="/host/analytics"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}"
          >
            <app-analytics-icon class="icon" />
            <span>Analytics</span>
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link sidebar-link d-flex align-items-center justify-content-start gap-2"
            routerLink="/host/bookings"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}"
          >
            <app-booking-icon class="icon" />
            <span>Bookings</span>
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link sidebar-link d-flex align-items-center justify-content-start gap-2"
            routerLink="/host/profile"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}"
          >
            <app-profile-icon class="icon" />
            <span>Profile</span>
          </a>
        </li>
      </ul>
    </div>
    <div>
      <app-logout-button />
    </div>
  </div>
</aside>
