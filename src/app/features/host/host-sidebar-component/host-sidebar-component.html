<aside class="d-flex h-100">
  <div class="host-sidebar-container d-flex flex-column rounded-4 flex-fill py-4 px-3">
    <header class="mb-4">
      <h4 class="fw-bold text-primary-custom text-center">Eventizer</h4>
    </header>

    <div class="items-container flex-grow-1">
      <ul class="nav flex-column gap-2 sidebar-nav">
        <li class="nav-item">
          <a
            class="nav-link sidebar-link d-flex align-items-center"
            routerLink="/host"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}"
          >
            <img
              class="sidebar-icon me-2"
              ngSrc="/icons/event.png"
              alt="Events Icon"
              width="15"
              height="15"
            />
            <span>Manage Events</span>
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link sidebar-link d-flex align-items-center"
            routerLink="/host/analytics"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}"
          >
            <img
              class="sidebar-icon me-2"
              ngSrc="/icons/analytics.png"
              alt="Analytics Icon"
              width="15"
              height="15"
            />
            <span>Analytics</span>
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link sidebar-link d-flex align-items-center"
            routerLink="/host/bookings"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}"
          >
            <img
              class="sidebar-icon me-2"
              ngSrc="/icons/online-booking.png"
              alt="Booking Icon"
              width="15"
              height="15"
            />
            <span>Bookings</span>
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link sidebar-link d-flex align-items-center"
            routerLink="/host/profile"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}"
          >
            <img
              class="sidebar-icon me-2"
              ngSrc="/icons/profile.png"
              alt="Profile Icon"
              width="15"
              height="15"
            />
            <span>Profile</span>
          </a>
        </li>
      </ul>
    </div>
    <div>
      <app-logout-button />
    </div>
  </div>
</aside>
