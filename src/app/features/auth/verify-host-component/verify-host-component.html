<div class="verify-wrapper vh-100 d-flex">
  <div class="helper-wrapper m-4 flex-fill rounded-4">
    @if (showVerificationForm()) {
      <div class="d-flex justify-content-center align-items-center h-100">
        <div class="form-container p-5">
          <form [formGroup]="hostVerificationForm" (ngSubmit)="handleSubmit()">
            <div>
              <h1>
                Complete the form.
              </h1>
            </div>

            <label class="form-label w-100 mt-3">
              Company name
              <input class="form-control w-100 mt-1" placeholder="Enter your company name in here." formControlName="company_name"/>
            </label>

            <label class="form-label w-100 mt-2">
              Company email
              <input class="form-control w-100 mt-1" placeholder="Enter your company email in here." formControlName="company_contact_email"/>
            </label>

            <label class="form-label w-100 mt-2">
              Company number
              <input class="form-control w-100 mt-1" placeholder="Enter your company no in here." formControlName="company_contact_no"/>
            </label>

            <div class="d-flex justify-content-center mt-3">
              <button>Submit</button>
            </div>
          </form>
        </div>
      </div>
    } @else {
      Host details in here.
    }
  </div>
</div>
