<div class="container-fluid px-0">
  <div class="row m-0 min-vh-100">
    <div class="d-none d-lg-block col-lg-8">
      left section
    </div>
    <div class="col-12 col-lg-4 d-flex justify-content-center align-items-center p-0">
      <div class="form-wrapper d-flex justify-content-center align-items-center w-100 h-100 p-0">
        <form

          [formGroup]="signupForm"
          (ngSubmit)="onSubmit()"
        >
          <div class="mb-4">
            <h1 class="m-0">SignUp</h1>
            <h5>
              Lets us help you find your desired events.
            </h5>
          </div>

          <div class="mb-3">
            <label for="username" class="form-label">
              Username
            </label>
            <input
              type="text"
              class="form-control"
              id="username"
              formControlName="username"
              placeholder="Your Username"
            >
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">
              Email
            </label>
            <input
              type="password"
              class="form-control"
              id="email"
              formControlName="email"
              placeholder="Your Email"
            >
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">
              Password
            </label>
            <input
              type="password"
              class="form-control"
              id="password"
              formControlName="password"
              placeholder="Password"
            >
          </div>

          <div class="mb-3 form-check">
            <input
              type="checkbox"
              class="form-check-input"
              id="ishost"
              formControlName="isHost"
            >
            <span>Register as a Host?</span>
          </div>
          <div class="d-flex justify-content-center">
            <button
              class="btn w-75 rounded-4"
            >
              Submit
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
