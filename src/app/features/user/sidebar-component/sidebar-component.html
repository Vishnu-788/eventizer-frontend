<aside class="d-flex h-100">
  <div class="sidebar-container d-flex flex-column rounded-4 flex-fill py-4 px-3">
    <header class="mb-4">
      <h4 class="text-primary-custom text-center">Eventizer</h4>
    </header>

    <div class="items-container flex-grow-1">
      <ul class="nav flex-column gap-2 sidebar-nav">
        <li class="nav-item">
          <a
            class="nav-link sidebar-link d-flex align-items-center justify-content-start gap-2"
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}"
          >
            <app-date-icon class="icon flex-grow-0" />
            <span class="flex-grow-1">Explore</span>
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link sidebar-link d-flex align-items-center justify-content-start gap-2"
            routerLink="/bookings"
            routerLinkActive="active"
          >
            <app-booking-icon class="icon flex-grow-0" />
            <span class="flex-grow-1">Bookings</span>
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link sidebar-link d-flex align-items-center justify-content-start gap-2"
            routerLink="/tickets"
            routerLinkActive="active"
          >
            <app-tickets-icon class="icon flex-grow-0" />
            <span class="flex-grow-1">Tickets</span>
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link sidebar-link d-flex align-items-center justify-content-start gap-2"
            routerLink="/assistant"
            routerLinkActive="active"
          >
            <app-assistant-icon class="icon flex-grow-0" />
            <span class="flex-grow-1">Assistant</span>
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link sidebar-link d-flex align-items-center justify-content-start gap-2"
            routerLink="/profile"
            routerLinkActive="active"
          >
            <app-profile-icon class="icon flex-grow-0" />
            <span class="flex-grow-1">Profile</span>
          </a>
        </li>
      </ul>
    </div>
    <div>
      <app-logout-button />
    </div>
  </div>
</aside>
