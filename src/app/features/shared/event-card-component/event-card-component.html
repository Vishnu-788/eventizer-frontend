<div
  class="event-card rounded-4 p-4"
  (click)="handleClick()"
>
  <div class="event-header d-flex justify-content-between align-items-start">
    <div>
      <h2>{{ event().e_title }}</h2>
      <div class="event-meta mt-2">
        <div class="meta-item">
          <i class="bi bi-clock"></i>
          <span>{{ event().e_start_time }}</span>
        </div>

        <div class="meta-item">
          <i class="bi bi-geo-alt"></i>
          <span>{{ event().e_venue }}</span>
        </div>
      </div>
    </div>

    <span class="category-badge">
      {{ event().e_category }}
    </span>
  </div>
</div>
