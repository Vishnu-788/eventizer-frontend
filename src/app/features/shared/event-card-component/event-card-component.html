<div class="event-card rounded-4 p-4" (click)="handleClick()">
  <div class="event-header d-flex justify-content-between align-items-center">
    <h1>{{event()?.e_title}}</h1>
    <span class="rounded-5 p-2 d-flex justify-content-center">{{event()?.e_category}}</span>
  </div>

  <hr>

  <div class="event-card-body my-3">
    <div class="event-date d-flex my-2 gap-2">
      <div class="icon-container rounded-2">
        <app-date-icon class="icon" />
      </div>
      <div>
        <div class="meta-label">Date</div>
        <div>{{event()?.e_date}}</div>
      </div>
    </div>

    <div class="event-date d-flex my-2 gap-2">
      <div class="icon-container rounded-2">
        <app-time-icon class="icon" />
      </div>
      <div>
        <div class="meta-label">Time</div>
        <div>
          {{ event()?.e_start_time | date:'h:mm a' }} -
          {{ event()?.e_end_time | date:'h:mm a' }}
        </div>
      </div>
    </div>
  </div>

  <hr>

  <div class="event-card-footer d-flex justify-content-between align-items-center">
    <div class="event-date d-flex align-items-center justify-content-center gap-2">
      <div class="icon-container rounded-2">
        <app-location-icon class="icon" />
      </div>
      <div>
        <div class="meta-label">Venue</div>
        <div>
          {{ event()?.e_venue}}
        </div>
      </div>
    </div>
    <div class="price-tag d-flex flex-column align-items-center rounded-4 p-2">
      <div class="meta-label">Price</div>
      <div>
       $ {{ event()?.price }}
      </div>
    </div>
  </div>
</div>
