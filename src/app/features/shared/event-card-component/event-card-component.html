<div class="event-card d-flex justify-content-between align-items-center">

  <!-- Left -->
  <div class="event-info">

    <h5 class="mb-1 fw-semibold">
      {{ event().e_title }}
    </h5>

    <p class="mb-2 text-muted small">
      {{ event().e_description }}
    </p>

    <div class="d-flex gap-4 small text-secondary">
      <span>📍 {{ event().e_venue }}</span>
      <span>📅 {{ event().e_date }}</span>
      <span>⏰ {{ event().e_start_time }} - {{ event().e_end_time }}</span>
    </div>

  </div>

  <!-- Right -->
  <div class="text-end">

    <div class="fw-bold fs-5 mb-2">
      ₹{{ event().price }}
    </div>

    <div class="small text-muted mb-2">
      {{ event().total_seats }} seats
    </div>

    <button class="btn btn-sm book-btn rounded-pill">
      View
    </button>

  </div>

</div>
