<div class="event-card d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 p-3">

  <!-- Left -->
  <div class="event-info flex-grow-1">

    <h5 class="mb-1 fw-semibold text-truncate">
      {{ event().e_title }}
    </h5>

    <div class="d-flex flex-wrap gap-3 small text-secondary">

      <span class="d-flex align-items-center gap-1">
        📍 <span class="text-truncate">{{ event().e_venue }}</span>
      </span>

      <span class="d-flex align-items-center gap-1">
        🏷 {{ event().e_category }}
      </span>

      <span class="d-flex align-items-center gap-1">
        ⏰ {{ event().e_start_time }}
      </span>

    </div>

  </div>

  <!-- Right -->
  <div class="text-md-end w-100 w-md-auto">

    <div class="fw-bold fs-5 text-primary mb-2">
      ₹{{ event().price }}
    </div>

    <button class="btn book-btn rounded-pill px-4" (click)="handleClick()">
      View
    </button>

  </div>

</div>
